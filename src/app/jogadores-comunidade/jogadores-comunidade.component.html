<div class="page">

    <button type="button" class="btn-back-home" (click)="voltarHome()">
        ← Voltar para Home
    </button>

    <div class="page-header">
        <div>
            <h1>Jogadores Comunidade</h1>
            <p>Cadastre jogadores, Tekken ID e personagens utilizados.</p>
        </div>

        <button type="button" class="btn-primary" (click)="novoJogador()">
            + Cadastrar jogador
        </button>
    </div>

    <div *ngIf="carregando" class="loading">
        Carregando jogadores...
    </div>

    <div *ngIf="!carregando && jogadores.length === 0" class="empty">
        Nenhum jogador cadastrado.
    </div>

    <div *ngIf="!carregando && jogadores.length > 0" class="players-grid">

        <article class="player-card" *ngFor="let jogador of jogadoresPaginados">

            <div class="player-header">

                <div class="player-avatar">
                    <img *ngIf="jogador.foto" [src]="jogador.foto" [alt]="jogador.nome"
                        (error)="usarImagemPadrao($event)" />

                    <span *ngIf="!jogador.foto">
                        {{ jogador.nome?.charAt(0) }}
                    </span>
                </div>

                <div class="player-main-info">
                    <h3>{{ jogador.nome }}</h3>
                    <p>🎮 Tekken ID: {{ jogador.tekkenId }}</p>
                </div>

            </div>

            <div class="player-characters-preview" *ngIf="jogador.personagens?.length">

                <div class="mini-character" *ngFor="let personagem of jogador.personagens.slice(0, 3)"
                    [class.selected]="jogadorSelecionado?.id === jogador.id && personagemSelecionado?.id === personagem.id"
                    (click)="selecionarPersonagemDoJogador(jogador, personagem)">

                    <img [src]="getImagemProfilePersonagem(personagem)" [alt]="personagem.nome"
                        (error)="usarImagemPadrao($event, personagem)" />

                    <span>{{ obterNomeCurto(personagem.nome) }}</span>

                </div>

            </div>

            <div class="player-characters-preview empty-preview" *ngIf="!jogador.personagens?.length">
                <span>Nenhum personagem vinculado</span>
            </div>

            <div class="player-actions">

                <button type="button" class="btn-view" (click)="visualizarPlayerStyle(jogador)">
                    Player style
                </button>

                <button type="button" class="btn-edit" (click)="editarJogador(jogador)">
                    ✎ Editar
                </button>

                <button type="button" class="btn-delete" *ngIf="isAdmin" (click)="excluirJogador(jogador)">
                    🗑 Excluir
                </button>

            </div>

        </article>

    </div>

    <div class="paginator" *ngIf="!carregando && jogadores.length > itensPorPagina">

        <button type="button" class="page-btn page-arrow" [disabled]="paginaAtual === 1" (click)="paginaAnterior()">
            ←
        </button>

        <button type="button" class="page-btn" *ngFor="let pagina of paginas" [class.active]="paginaAtual === pagina"
            (click)="irParaPagina(pagina)">
            {{ pagina }}
        </button>

        <button type="button" class="page-btn page-arrow" [disabled]="paginaAtual === totalPaginas"
            (click)="proximaPagina()">
            →
        </button>

    </div>

</div>
